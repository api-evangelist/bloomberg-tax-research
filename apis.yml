aid: bloomberg-tax-research
name: Bloomberg Tax Research
description: Bloomberg Tax Research provides tax professionals with comprehensive
  access to primary sources, expert practitioner analysis, portfolios, and tax news
  for conducting in-depth tax research. The platform covers federal income tax, state
  and local tax (SALT), international tax, estate planning, benefits, payroll, and
  transfer pricing research.
type: Index
